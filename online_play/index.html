<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <!-- スマホ向けビューポート設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TCG Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- アプリ全体のコンテナ -->
    <div id="app">

        <!-- メインコンテンツエリア -->
        <main id="main-content">

            <!-- 0. ロビービュー (部屋選択) -->
            <div id="lobby-view" class="view active">
                <div class="lobby-container">
                    <h2>Online Matchmaking</h2>

                    <div class="lobby-section">
                        <label for="room-name-input" style="display:block; margin-bottom:5px; font-weight:bold;">部屋名 (任意)</label>
                        <input type="text" id="room-name-input" placeholder="例: 初心者歓迎！" maxlength="20" style="width:100%; padding:10px; margin-bottom:10px; border-radius:4px; border:1px solid #ccc; background:#12141a; color:white;">
                        
                        <div id="room-tags" style="margin-bottom: 10px; font-size: 0.9em; display: flex; gap: 10px; flex-wrap: wrap;">
                            <label><input type="checkbox" value="初心者向け" class="room-tag-checkbox"> 初心者向け</label>
                            <label><input type="checkbox" value="ガチ対戦" class="room-tag-checkbox"> ガチ対戦</label>
                            <label><input type="checkbox" value="エンジョイ" class="room-tag-checkbox"> エンジョイ</label>
                            <label><input type="checkbox" value="デッキテスト" class="room-tag-checkbox"> デッキテスト</label>
                        </div>
                        
                        <label for="room-password-create" style="display:block; margin-bottom:5px; font-weight:bold;">パスワード (任意)</label>
                        <input type="password" id="room-password-create" placeholder="設定する場合のみ入力" maxlength="10" style="width:100%; padding:10px; margin-bottom:15px; border-radius:4px; border:1px solid #ccc; background:#12141a; color:white;">

                        <label for="deck-select" style="display:block; margin-bottom:8px; font-weight:bold;">使用するデッキ
                            (種類のみ抽出されます)</label>
                        <select id="deck-select"
                            style="width:100%; padding:10px; margin-bottom:15px; border-radius:4px; border:1px solid #ccc; background:#12141a; color:white;">
                            <option value="">デッキを読み込み中...</option>
                        </select>
                        <button id="btn-create-room" class="btn-primary" style="width:100%; padding:15px; font-size:1.1em; font-weight:bold;">部屋を作る (Create Room)</button>
                    </div>

                    <div class="lobby-divider">- OR -</div>

                    <!-- 部屋一覧掲示板 -->
                    <div class="lobby-section">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <h3 style="margin: 0; font-size: 1.1em;">現在の部屋一覧</h3>
                            <button id="btn-refresh-rooms" style="padding: 5px 10px; font-size: 0.9em; background: #444; color: white; border: 1px solid #666; border-radius: 4px; cursor: pointer;">🔄 更新</button>
                        </div>
                        <div id="room-list-container" class="room-list-container">
                            <div style="text-align: center; color: #888; padding: 20px;">読み込み中...</div>
                        </div>
                    </div>

                    <div class="lobby-divider">- OR -</div>

                    <div class="lobby-section">
                        <input type="text" id="input-room-id" placeholder="Room ID (e.g. 1234)" maxlength="4">
                        <div class="button-group">
                            <button id="btn-join-player" class="btn-secondary">対戦に参加 (Join P2)</button>
                            <button id="btn-join-spectator" class="btn-outline">観戦する (Spectate)</button>
                        </div>
                    </div>

                    <div id="room-status-msg"></div>

                    <div class="lobby-notice" style="margin-top: 20px; padding: 10px; background: rgba(255,100,100,0.1); border: 1px solid #ff4444; border-radius: 4px; font-size: 0.85em; color: #ddd; line-height: 1.4;">
                        <b>【通信量についてのお願い】</b><br>
                        リアルでのプレイ（対面）で使用する場合は、通信制限への配慮および通信コスト削減のため、映像通信は「オフ」のままでご協力をお願いします。（映像は必要に応じて対戦画面からオンにできます）
                    </div>
                </div>
            </div>

            <!-- A. 盤面ビュー -->
            <div id="board-view" class="view">
                <div class="room-info-bar">
                    Room: <span id="current-room-id">---</span> |
                    <span id="role-display">---</span>
                </div>
                <div id="board-grid">
                    <!-- JavaScriptで4x5のマス(div.cell)を生成してここに配置します -->
                </div>
                <!-- 盤面下部にデッキ表示 -->
                <div id="board-deck" class="deck-area-small">
                    <!-- JavaScriptでデッキを描画 -->
                </div>
            </div>

            <!-- B. 操作ビュー (カメラ画) -->
            <div id="control-view" class="view">
                <div style="position: absolute; top: 10px; right: 10px; z-index: 10;">
                    <button id="btn-toggle-video" class="btn-primary" style="padding: 5px 10px; font-size: 0.9em; border-radius: 4px; cursor: pointer;">📹 カメラ・マイクをオンにする</button>
                </div>
                <!-- 相手の映像 (メイン画面) -->
                <video id="remote-video" autoplay playsinline
                    poster="https://placehold.jp/3d4070/ffffff/320x240.png?text=Remote%20Video"></video>

                <!-- 自分の映像 (ワイプ/PinP) -->
                <video id="local-video" autoplay playsinline muted></video>
            </div>

        </main>

        <!-- 固定フッター (ナビゲーション) -->
        <footer id="footer">
            <button id="btn-board" class="nav-btn">盤面</button>
            <button id="btn-control" class="nav-btn">操作 (カメラ/デッキ)</button>
        </footer>

        <!-- オーバーレイ (スタック選択用モーダル) -->
        <div id="stack-modal" class="modal hidden">
            <div class="modal-content">
                <h3>重なっているカード</h3>
                <div id="stack-list">
                    <!-- ここに重なっているカード一覧を表示 -->
                </div>
                <button id="btn-close-modal">閉じる</button>
            </div>
        </div>

    </div>

    <!-- Socket.io Client (loaded from CDN) -->
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <!-- ロジック読み込み -->
    <script src="script.js"></script>
</body>

</html>
