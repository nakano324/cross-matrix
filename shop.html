<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0b10" />
  <title>Cross Matrix｜公式ショップ</title>
  <link rel="icon" href="https://pub-c46d5e1d4d8a477081b4f23ef851c417.r2.dev/images/HPicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>
    /* style.css が効かない場合のための保険＆ショップ専用スタイル */
    :root {
      --bg: #0a0b10;
      --panel: #12141b;
      --fg: #e7e8ee;
      --muted: #a3a7b5;
      --line: rgba(255, 255, 255, .08);
      --accent: #d4af37;
      --radius: 20px;
      --wrap: 1180px;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: "Noto Sans JP", sans-serif;
    }

    /* ショップ専用レイアウト */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .shop-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .02));
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s;
    }

    .shop-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
    }

    .shop-thumb-wrap {
      aspect-ratio: 16/9;
      background: #000;
      overflow: hidden;
      position: relative;
    }

    .shop-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.3s;
    }

    .shop-meta {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .shop-price {
      color: var(--accent);
      font-size: 1.4rem;
      font-weight: 800;
      margin: 4px 0 12px;
    }

    .shop-desc {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* カートボタン */
    .btn-cart {
      margin-top: auto;
      width: 100%;
      padding: 12px;
      background: var(--fg);
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cart:hover {
      background: var(--accent);
    }

    /* ローディングアニメーション */
    #loading {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="wrap">
      <h1 class="brand"><a href="index.html"><img src="images/cross_matrix.png" alt="CROSS MATRIX"
            style="height:48px;"></a></h1>
      <nav class="nav">
        <a href="index.html">ホーム</a>
        <a href="cards.html">カード図鑑</a>
        <a href="rules.html">ルール</a>
        <a href="shop.html" class="active">ショップ</a>
        <a href="news.html">ブログ</a>
        <a href="my-decks.html">マイデッキ</a>
        <a href="online_play/index.html">オンライン戦</a>
        <a href="cart.html" id="cart-link" style="color:var(--accent)">カート(0)</a>
        <a href="login.html" class="auth-login-link">ログイン</a>
        <a href="#" class="auth-logout-link hidden">ログアウト</a>
      </nav>
      <button class="hamburger" id="navToggle" aria-label="メニュー" aria-controls="mobileMenu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <nav class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <div class="mobile-menu-inner">
      <a href="index.html">ホーム</a>
      <a href="cards.html">カード図鑑</a>
      <a href="rules.html">ルール</a>
      <a href="shop.html">ショップ</a>
      <a href="news.html">ブログ</a>
      <a href="my-decks.html">マイデッキ</a>
      <a href="online_play/index.html">オンライン戦</a>
      <a href="cart.html" id="mobile-cart-link" style="color:var(--accent)">カート(0)</a>
      <a href="login.html" class="auth-login-link">ログイン</a>
      <a href="#" class="auth-logout-link hidden">ログアウト</a>
    </div>
    <button class="menu-close" id="navClose" aria-label="閉じる">×</button>
  </nav>
  <main>
    <section class="hero" style="min-height: 40vh; display: flex; align-items: center;">
      <div class="wrap inner" style="padding: 40px 20px;">
        <div class="lead">
          <h1>OFFICIAL STORE</h1>
          <p>拡張パック、構築済みデッキ、サプライの購入はこちらから。</p>
        </div>
      </div>
    </section>

    <section>
      <div class="wrap">
        <h2>商品一覧</h2>

        <div id="loading">
          <div class="spinner"></div>
          <p>サーバー起動中...<br><small>※最初の読み込みには30秒ほどかかる場合があります</small></p>
        </div>

        <div id="product-list" class="shop-grid"></div>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap"><small>© 2025 Cross Matrix Project</small></div>
  </footer>

  <script>
    // あなたのAPIサーバーURL
    const API_URL = "https://cross-matrix-shop-api.onrender.com/api/products";

    // 1. ページが開いたら実行される処理
    document.addEventListener('DOMContentLoaded', () => {
      fetchProducts();
      updateCartCount(); // カートの数字を更新
    });

    // 2. 商品を取得して表示
    async function fetchProducts() {
      const container = document.getElementById('product-list');
      const loading = document.getElementById('loading');

      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error("取得失敗");
        const products = await res.json();

        loading.style.display = 'none';

        if (products.length === 0) {
          container.innerHTML = '<p style="color:var(--muted)">商品がありません。</p>';
          return;
        }

        products.forEach(product => {
          const card = document.createElement('article');
          card.className = 'shop-card';
          const imgSrc = product.image || 'https://placehold.co/600x400/1a1d27/e6e6eb?text=No+Image';

          // 重要：ボタンに onclick="addToCart(...)" を追加しました
          // 商品データ(product)を文字にして渡しています
          const productJson = JSON.stringify(product).replace(/"/g, '&quot;');

          card.innerHTML = `
                    <div class="shop-thumb-wrap">
                        <img class="shop-thumb" src="${imgSrc}" alt="${product.name}">
                    </div>
                    <div class="shop-meta">
                        <h3 class="name" style="margin:0">${product.name}</h3>
                        <div class="shop-price">¥${product.price.toLocaleString()}</div>
                        <p class="shop-desc">${product.description || ''}</p>
                        <button class="btn-cart" onclick='addToCart(${productJson})'>カートに入れる 🛒</button>
                    </div>
                `;
          container.appendChild(card);
        });
      } catch (err) {
        console.error(err);
        loading.innerHTML = `<p>エラー: ${err.message}</p>`;
      }
    }

    // 3. カートに入れる機能
    function addToCart(product) {
      // 今のカートの中身を取り出す（なければ空っぽの箱を用意）
      let cart = JSON.parse(localStorage.getItem('cm_cart') || "[]");

      // 商品を箱に入れる
      cart.push(product);

      // 箱を保存する
      localStorage.setItem('cm_cart', JSON.stringify(cart));

      // 画面の数字を更新
      updateCartCount();
      alert(`${product.name} をカートに入れました！`);
    }

    // 4. ナビゲーションの「カート」の数字を更新する
    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cm_cart') || "[]");
      // ナビゲーションに id="cart-link" をつけたタグが必要です（後述）
      const navLink = document.getElementById('cart-link');
      if (navLink) navLink.innerText = `カート(${cart.length})`;
    }
  </script>
  <script src="auth.js"></script>
</body>

</html>
