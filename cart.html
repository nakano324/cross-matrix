<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>カート｜Cross Matrix Store</title>
  <link rel="icon" href="https://pub-c46d5e1d4d8a477081b4f23ef851c417.r2.dev/images/HPicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    /* カート専用デザイン */
    :root {
      --bg: #0a0b10;
      --fg: #e7e8ee;
      --accent: #d4af37;
      --line: rgba(255, 255, 255, .08);
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: "Noto Sans JP", sans-serif;
    }

    .cart-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 12px;
    }

    .item-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .item-img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      background: #000;
    }

    .total-area {
      margin-top: 30px;
      padding: 20px;
      border-top: 2px solid var(--line);
      text-align: right;
      font-size: 1.5rem;
      font-weight: bold;
    }

    .checkout-btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 15px 40px;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
      display: inline-block;
      text-decoration: none;
    }

    .checkout-btn:hover {
      opacity: 0.9;
    }

    .btn-delete {
      background: transparent;
      border: 1px solid #ff4757;
      color: #ff4757;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-delete:hover {
      background: #ff4757;
      color: white;
    }
  </style>
</head>

<body>

  <header class="site-header">
    <div class="wrap">
      <h1 class="brand"><a href="index.html"><img src="images/cross_matrix.png" alt="CM" style="height:48px;"></a></h1>
      <nav class="nav">
        <a href="index.html">ホーム</a>
        <a href="cards.html">カード図鑑</a>
        <a href="rules.html">ルール</a>
        <a href="shop.html">ショップ</a>
        <a href="news.html">ブログ</a>
        <a href="my-decks.html">マイデッキ</a>
        <a href="online_play/index.html">オンライン戦</a>
        <a href="cart.html" class="active" id="cart-link" style="color:var(--accent)">カート(0)</a>
        <a href="login.html" class="auth-login-link">ログイン</a>
        <a href="#" class="auth-logout-link hidden">ログアウト</a>
      </nav>
      <button class="hamburger" id="navToggle" aria-label="メニュー" aria-controls="mobileMenu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <nav class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <div class="mobile-menu-inner">
      <a href="index.html">ホーム</a>
      <a href="cards.html">カード図鑑</a>
      <a href="rules.html">ルール</a>
      <a href="shop.html">ショップ</a>
      <a href="news.html">ブログ</a>
      <a href="my-decks.html">マイデッキ</a>
      <a href="online_play/index.html">オンライン戦</a>
      <a href="cart.html" id="mobile-cart-link" style="color:var(--accent)">カート(0)</a>
      <a href="login.html" class="auth-login-link">ログイン</a>
      <a href="#" class="auth-logout-link hidden">ログアウト</a>
    </div>
    <button class="menu-close" id="navClose" aria-label="閉じる">×</button>
  </nav>

  <main class="cart-container">
    <h1>🛒 ショッピングカート</h1>

    <div id="cart-list">
    </div>

    <div class="total-area">
      合計: <span id="total-price" style="color:var(--accent)">¥0</span>
      <br>
      <button class="checkout-btn" onclick="checkout()">レジに進む</button>
    </div>
  </main>

  <script>
    // ページが開いたらカートを表示
    loadCart();

    function loadCart() {
      // 保存されたカートを取り出す
      const cart = JSON.parse(localStorage.getItem('cm_cart') || "[]");
      const list = document.getElementById('cart-list');
      const totalEl = document.getElementById('total-price');

      list.innerHTML = "";
      let total = 0;

      if (cart.length === 0) {
        list.innerHTML = "<p>カートは空です。</p>";
        totalEl.innerText = "¥0";
        return;
      }

      // 商品を1つずつ表示
      cart.forEach((item, index) => {
        total += Number(item.price);

        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
                <div class="item-info">
                    <img src="${item.image || ''}" class="item-img" onerror="this.src='https://placehold.co/60'">
                    <div>
                        <div style="font-weight:bold">${item.name}</div>
                        <div style="color:var(--accent)">¥${Number(item.price).toLocaleString()}</div>
                    </div>
                </div>
                <button class="btn-delete" onclick="removeItem(${index})">削除</button>
            `;
        list.appendChild(div);
      });

      // 合計金額を更新
      totalEl.innerText = "¥" + total.toLocaleString();
    }

    // 削除機能
    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem('cm_cart') || "[]");
      cart.splice(index, 1); // 指定した場所を1つ消す
      localStorage.setItem('cm_cart', JSON.stringify(cart)); // 保存し直す
      loadCart(); // 画面を更新
    }

    // レジに進む（今はアラートだけ）
    function checkout() {
      const cart = JSON.parse(localStorage.getItem('cm_cart') || "[]");
      if (cart.length === 0) return alert("カートが空です");

      alert("まだ決済機能はありませんが、合計 " + document.getElementById('total-price').innerText + " の注文を受け付けました！");
    }
  </script>
  <script src="auth.js"></script>
</body>

</html>
